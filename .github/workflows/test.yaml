name: Test builds
on: workflow_dispatch

jobs:
  Linux:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 25, 26]
    name: Node.js ${{ matrix.node }}, Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Build
        run: |
          npm install -g node-gyp
          npm install --ignore-scripts
          node-gyp rebuild

      - name: Test binary
        run: npm run test

  MacOS:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 25, 26]
        os: [macos-15, macos-15-intel]
    name: Node.js ${{ matrix.node }}, MacOS ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Build
        run: |
          npm install -g node-gyp
          npm install --ignore-scripts
          node-gyp rebuild

      - name: Test binary
        run: npm run test

  Win:
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24, 25, 26]
    name: Node.js ${{ matrix.node }}, Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Build
        run: |
          npm install -g node-gyp
          npm install --ignore-scripts
          node-gyp rebuild

      - name: Test binary
        run: npm run test
